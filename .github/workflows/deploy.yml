name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (so it can work with static export).
          static_site_generator: next
      
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build with Next.js
        run: |
          echo "Starting Next.js build..."
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Next.js version: $(npx next --version)"
          npm run build
        env:
          GITHUB_ACTIONS: true
          NODE_ENV: production
      
      - name: Check for duplicate config files
        run: |
          echo "Checking for Next.js config files..."
          ls -la next.config.*
          if [ -f "next.config.js" ] && [ -f "next.config.ts" ]; then
            echo "⚠️ Both next.config.js and next.config.ts exist - removing .js file"
            rm next.config.js
          fi
      
      - name: Verify build output and export
        run: |
          echo "Checking build output..."
          ls -la
          
          if [ -d "out" ]; then
            echo "✅ out directory exists"
            echo "Contents of out directory:"
            ls -la out/
            echo "Total files in out:"
            find out -type f | wc -l
          else
            echo "❌ out directory does not exist"
            echo "Checking .next directory contents:"
            ls -la .next/
            
            echo "Checking export-marker.json:"
            if [ -f ".next/export-marker.json" ]; then
              cat .next/export-marker.json
            fi
            
            echo "Checking for static export in .next/server/app:"
            if [ -d ".next/server/app" ]; then
              find .next/server/app -name "*.html" | head -5
            fi
            
            echo "Attempting to copy static files from .next/static..."
            if [ -d ".next/static" ]; then
              mkdir -p out/_next/static
              cp -r .next/static/* out/_next/static/
            fi
            
            echo "Checking for server-side rendered pages..."
            if [ -d ".next/server/app" ]; then
              echo "Found app directory structure"
              # For Next.js 13+ with app router, static files are in different location
              find .next/server -name "*.html" -o -name "*.json" | head -10
            fi
            
            echo "Trying alternative build approach..."
            rm -rf out .next
            NEXT_EXPORT=true npm run build
            
            if [ ! -d "out" ]; then
              echo "Creating out directory manually from .next build..."
              mkdir -p out
              
              # Copy static assets
              if [ -d ".next/static" ]; then
                mkdir -p out/_next/static
                cp -r .next/static/* out/_next/static/
              fi
              
              # Copy public assets
              if [ -d "public" ]; then
                cp -r public/* out/
              fi
              
              # Create index.html from app build
              if [ -f ".next/server/app/index.html" ]; then
                cp .next/server/app/index.html out/
              elif [ -f ".next/server/pages/index.html" ]; then
                cp .next/server/pages/index.html out/
              else
                echo "<!DOCTYPE html><html><head><title>NUAM Prototype</title></head><body><div id=\"__next\">Loading...</div></body></html>" > out/index.html
              fi
            fi
            
            if [ -d "out" ]; then
              echo "✅ Successfully created out directory"
              ls -la out/
            else
              echo "❌ All export attempts failed"
              exit 1
            fi
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
